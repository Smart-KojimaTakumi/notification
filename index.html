<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="reset.css">
  <link rel="stylesheet" href="style.css">
  <script src="clock.js"></script>
  <script src="sound.js"></script>
  <script src="index.js"></script>
  <title>NOTIFICATION_App</title>
</head>
<body>
  <header>
    <a href="index.html" class="logo">smart & Co.</a>
  </header>
  <div class="main-wrapper">
    <div class="date-contents">
      <h1>現在時刻</h1>
      <p id="current-time" class="current-time">XX:XX:XX</p>
      <p id="current-status" class="current-status">集中学習開始（45分）</p>
    </div>
    <div class="log-contents">
      <h2>ログ</h2>
      <ul id="log-list" class="log-list">
        <li class="log-list-element">
          <p class="time">15:00</p>
          <p class="event">ペアになってアウトプット開始</p>
        </li>
        <li class="log-list-element">
          <p class="time">15:00</p>
          <p class="event">集中学習開始（45分）</p>
        </li>
        <li class="log-list-element">
          <p class="time">15:00</p>
          <p class="event">休憩（5分）</p>
        </li>
      </ul>
    </div>
  </div>
</body>
</html>
